# Shared server-level config for integration tests. Included from each .t's `--- config`.
# nginx reads this file directly, so Test::Nginx token substitution does not apply.
# jwt_secret_file, which contains a path, belongs in each .t's `--- config` instead.
# origin is a fixed value decoupled from the listen port, kept in sync with the
# clientDataJSON origin (webauthn_tool.py --origin).

auth_webauthn_rp_id            localhost;
auth_webauthn_origin           http://localhost:8080;
auth_webauthn_redis            127.0.0.1:6379;
auth_webauthn_redis_key_prefix webauthn:;
auth_webauthn_jwt_alg          HS256;
auth_webauthn_jwt_ttl          3600;
auth_webauthn_jwt_cookie_secure off;
