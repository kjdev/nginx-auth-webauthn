# Example nginx-auth-webauthn server config (for docker compose).
#
# Registration, login, the protected target and the WebAuthn endpoints are all
# served from one origin (http://localhost:8080). WebAuthn requires an exact
# origin (scheme+host+port) match, so the registration API is proxied to the
# Python app to keep a single origin. localhost is a secure-context exception,
# so plain HTTP works.

# Challenge shared memory (must be in the http context).
auth_webauthn_challenge_zone webauthn_challenge:10m;

# RP / origin. rp_id must match on both login and registration; origin must
# exactly match the URL actually used (the host-side 8080 mapping).
auth_webauthn_rp_id  localhost;
auth_webauthn_origin http://localhost:8080;

# Where registered credentials are read from (the compose redis service).
auth_webauthn_redis            redis:6379;
auth_webauthn_redis_key_prefix webauthn:;

# Session JWT (HS256). jwt.key is a sample secret; always replace it in prod.
auth_webauthn_jwt_secret_file /etc/nginx/webauthn/jwt.key;
auth_webauthn_jwt_alg         HS256;
auth_webauthn_jwt_ttl         3600;

# No Secure attribute because localhost is served over HTTP. Use `on` for HTTPS.
auth_webauthn_jwt_cookie_secure off;

# Upstream for the registration API (Flask).
upstream webauthn_register {
    server register:5000;
}

server {
    listen      80;
    server_name localhost;

    # nginx listens on 80 inside the container, but the browser connects via
    # the host-side mapping (8080). With absolute_redirect on (default) a
    # relative redirect is made absolute using listen port 80, yielding
    # http://localhost/ (port dropped) which is unreachable. Keep redirects
    # relative so the browser resolves them against its own origin.
    absolute_redirect off;

    # Login page (static).
    location /login/ {
        alias /usr/share/nginx/html/login/;
        index index.html;
    }

    # Registration page (static). begin/complete below win by longest-prefix.
    location /register/ {
        alias /usr/share/nginx/html/register/;
        index index.html;
    }

    # Registration API -> Python app (proxied to keep a single origin).
    location /register/begin {
        proxy_pass       http://webauthn_register;
        proxy_set_header Host $host;
    }
    location /register/complete {
        proxy_pass       http://webauthn_register;
        proxy_set_header Host $host;
    }

    # Challenge issuance.
    location = /webauthn/challenge {
        auth_webauthn_challenge_handler on;
    }

    # Assertion verification (sets the session JWT cookie on success).
    location = /webauthn/verify {
        auth_webauthn_verify_handler on;
    }

    # Protected target. Unauthenticated -> 302 to /login/, authenticated ->
    # the success page.
    location / {
        auth_webauthn            on;
        auth_webauthn_signin_url /login/;
        root  /usr/share/nginx/html/protected;
        index index.html;
    }
}
